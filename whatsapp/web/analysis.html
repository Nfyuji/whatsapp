<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>التحليل — تقارير واتس</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/assets/styles.css?v=1" />
</head>
<body data-page="analysis">
  <div id="page-main">
    <div class="page-head flex">
      <div>
        <h2><i class="fas fa-chart-line"></i> تحليل اليوم</h2>
        <p>متابعة ردود الموظفين — <span id="report-date">—</span></p>
      </div>
      <div class="flex">
        <input type="date" id="date-filter" class="form-row" style="width:auto;margin:0" />
        <button class="btn btn-primary" id="btn-ask"><i class="fas fa-paper-plane"></i> إرسال السؤال الآن</button>
      </div>
    </div>
    <div class="stats-row" id="stats"></div>
    <div class="card">
      <div class="card-head"><h3><i class="fas fa-inbox"></i> ردود الموظفين</h3></div>
      <div class="report-feed" id="feed"></div>
    </div>
  </div>
  <div id="toast" class="toast hidden"></div>
  <script src="/assets/layout.js?v=1"></script>
  <script src="/assets/app.js?v=1"></script>
  <script src="/assets/analysis.js?v=1"></script>
</body>
</html>
