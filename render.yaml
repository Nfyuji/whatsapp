services:
  - type: web
    name: whatsapp-reports
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: PORT
        value: 8090
      - key: DATABASE_PATH
        value: /data/app.db
      - key: CONFIG_PATH
        value: /data/config.json
    disk:
      name: whatsapp-data
      mountPath: /data
      sizeGB: 1
